version: '3.8'

services:
  # Laravel App container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restosuite-api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: restosuite_db
      DB_USERNAME: restosuite_user
      DB_PASSWORD: restosuite_password
      REDIS_HOST: redis
    depends_on:
      - db
      - redis
    networks:
      - restosuite-network

  # Nginx container
  web:
    image: nginx:alpine
    container_name: restosuite-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - restosuite-network

  # PostgreSQL DB container
  db:
    image: postgres:15-alpine
    container_name: restosuite-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: restosuite_db
      POSTGRES_USER: restosuite_user
      POSTGRES_PASSWORD: restosuite_password
    volumes:
      - restosuite-db-data:/var/lib/postgresql/data
    networks:
      - restosuite-network

  # Redis container for cache & WebSockets
  redis:
    image: redis:alpine
    container_name: restosuite-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - restosuite-network

  # Queue Worker container
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restosuite-queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: restosuite_db
      DB_USERNAME: restosuite_user
      DB_PASSWORD: restosuite_password
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    command: php artisan queue:work
    depends_on:
      - app
    networks:
      - restosuite-network

networks:
  restosuite-network:
    driver: bridge

volumes:
  restosuite-db-data:
    external: true
    name: backend_restosuite-db-data
